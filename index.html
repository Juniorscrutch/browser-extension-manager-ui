<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Mentor | Browser extensions manager UI</title>
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<body>
  <nav class="navbar">
    <img src="./assets/images/logo.svg" alt="Logo" width="100" height="50" class="logo">
    <img src="./assets/images/icon-moon.svg" alt="dark-mode" width="25" height="50" class="dark-mode-toggle">
  </nav>
  <div class="header">
    <h1>Browser Extensions</h1>
    <p class="filter">
      <a href="#" data-filter="all">All</a>
      <a href="#" data-filter="active">Active</a>
      <a href="#" data-filter="inactive">Inactive</a>
    </p>
  </div>
  <div id="container"></div>

  <script src="./index.js"></script>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Gnaglo Date</a>.
  </div>
</body>

</html>
